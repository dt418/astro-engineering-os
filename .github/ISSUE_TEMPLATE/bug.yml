name: Bug Report
description: Create a report to help us improve
title: '[BUG] '
labels: ['bug', 'triage']
assignees: []
projects: []
milestone: ''

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        
        Thanks for taking the time to report this issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: |
        **Describe the bug**
        A clear and concise description of what the bug is.

        **To Reproduce**
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error

        **Expected Behavior**
        A clear and concise description of what you expected to happen.

        **Actual Behavior**
        A clear and concise description of what actually happened.

        **Screenshots**
        If applicable, add screenshots to help explain your problem.
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - Application crashes, data loss
        - High - Major functionality broken
        - Medium - Some functionality impaired
        - Low - Minor issue, workaround exists
        - Cosmetic - UI/UX issue
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How quickly should this be addressed?
      options:
        - P0 - Critical, immediate fix needed
        - P1 - High priority, fix soon
        - P2 - Medium priority, fix in normal sprint
        - P3 - Low priority, fix when time allows
        - P4 - Backlog, no urgency
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the package are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        **Browser/Device:**
        - Browser [e.g., Chrome, Safari]
        - Version [e.g., 120.x.x.x]
        - Device [e.g., Desktop, Mobile]

        **OS:**
        - OS [e.g., macOS, Windows, Linux]
        - Version [e.g., 14.x.x]

        **Node.js version:**
        - Run `node --version`
      render: markdown
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Provide a step-by-step description of how to reproduce the bug.
        
        1. 
        2. 
        3. 
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Paste any relevant log output here. Use code blocks for formatting.
        
        ```
        // Your logs here
        ```
      render: markdown
    validations:
      required: false

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Fix
      description: |
        If you have a suggestion for how to fix the bug, please describe it here.
      render: markdown
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for related issues
          required: true
        - label: I have included version information
          required: false
        - label: I have included reproduction steps
          required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: |
        Any other relevant information...
      render: markdown
    validations:
      required: false